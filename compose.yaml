name: FlaskFinalProject

networks:
  finalProject:



services:
  db:
    container_name: "db"
    build:
      context: postgres
    ports:
      - '5432:5432'
    expose:
      - 5432
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    container_name: "api"
    restart: on-failure
    depends_on: # Wait until the DB is up.
      db:
        condition: service_healthy
    build:
     context: api # Tells Docker where the Dockerfile is.
    ports:
      - '5000:5000'
    expose:
      - 5000

  web:
    depends_on:
      api:
        condition: service_started
    build:
      context: web
    ports:
      - "8080:80"
    expose:
      - 8080